name: 🚀 Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    name: 📦 Publish NuGet Package
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: 📦 Restore dependencies
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build MyBatis.NET.csproj --configuration Release --no-restore

    - name: 🔨 Build Tests
      run: dotnet build Tests/MyBatis.NET.Tests.csproj --configuration Release --no-restore

    - name: 🧪 Run Tests
      run: dotnet test Tests/MyBatis.NET.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category!=Integration"

    - name: 📦 Pack
      run: dotnet pack MyBatis.NET.csproj --configuration Release --no-build --output nuget-packages
      
    - name: 🚀 Publish to NuGet
      run: |
        Get-ChildItem nuget-packages/MyBatis.NET.SqlServer*.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
